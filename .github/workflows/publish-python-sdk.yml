name: publish-python-sdk

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: github.repository == 'Ottili-ONE/coder-cli'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Set version from release tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [ -z "$TAG" ]; then
            TAG="$(git describe --tags --abbrev=0 2>/dev/null || echo v1.0.0)"
          fi
          VERSION="${TAG#v}"
          export VERSION
          python - <<'PY'
          import os
          from pathlib import Path
          import re
          version = os.environ["VERSION"]
          path = Path("packages/sdk/python/pyproject.toml")
          text = path.read_text()
          text = re.sub(r'(?m)^version = "[^"]+"', f'version = "{version}"', text)
          path.write_text(text)
          init = Path("packages/sdk/python/src/ottili_coder/__init__.py")
          init.write_text(re.sub(r'__version__ = "[^"]+"', f'__version__ = "{version}"', init.read_text()))
          PY

      - name: Build and publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python packages/sdk/python/scripts/publish.py
